services:
  mt3-web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt3-web-ui
    restart: unless-stopped
    # Use host network mode so the container can access the host's localhost directly
    # This allows it to route to the MT3 container running on localhost:5000
    # It also automatically binds the web UI to 0.0.0.0:3000 on the host
    network_mode: "host"
    environment:
      - NODE_ENV=production
      - PORT=5678
      - MT3_API_URL=http://localhost:5000/transcribe-anything

  mt3-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: mt3-engine
    restart: unless-stopped
    # Use host network to easily expose port 5000 directly to localhost
    network_mode: "host"
    # Pass through all GPUs to the container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
